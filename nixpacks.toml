# Coolify's nixpacks build broke twice over on the stock nixpkgs pin:
#  - its nodejs_22 is 22.11.0, below the >=22.12 floor vite 8 / TanStack Start /
#    nitro-nightly require (all the EBADENGINE warnings in the deploy log)
#  - that Node bundles npm 10.9.0, which silently skips platform-specific
#    optional deps (@rolldown/*, @tailwindcss/oxide-*, lightningcss-*) when
#    installing from this npm-11 lockfile, so `vite build` dies with
#    "Cannot find module '@rolldown/binding-linux-x64-gnu'"

[phases.setup]
# nixos-25.11 channel snapshot (2026-07): nodejs_22 -> 22.22.x
nixpkgsArchive = 'b6018f87da91d19d0ab4cf979885689b469cdd41'

[phases.install]
# Install with the same npm major that wrote package-lock.json so the Linux
# native bindings are actually installed; --libc=glibc guards against npm
# mis-detecting libc under the Nix-built Node.
cmds = ['npx -y npm@11 ci --libc=glibc']

[phases.build]
cmds = ['npm run build']

# Run the Nitro node-server this build produces (.output/server/index.mjs),
# listening on :3000. Pinning the start cmd keeps the container CMD explicit
# and ensures Coolify runs the SSR server — NOT a static Caddy/nginx file
# server. (Coolify only wraps output in Caddy when "Is it a static site?" is
# on; keep that toggle OFF for this app.)
[start]
cmd = 'node .output/server/index.mjs'
